<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Pong</title>
    <style>
        body {
            background-color: #03060f;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; 
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #526280; 
            margin-bottom: 20px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #02040a;
            cursor: none; 
        }
    </style>
</head>
<body>

    <h1>JUST PONG</h1>
    <p>Move your mouse up and down to control the left paddle. First to 3 points wins!</p>
    
    <canvas id="pongCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // --- GAME VARIABLES ---
        let playerScore = 0;
        let aiScore = 0;
        const winningScore = 3; 
        let gameOver = false;
        let winMessage = "";

        const paddleWidth = 12;
        const paddleHeight = 90;

        const player = {
            x: 30,
            y: canvas.height / 2 - paddleHeight / 2,
            score: 0
        };

        const ai = {
            x: canvas.width - 30 - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            score: 0,
            speed: 5.0 
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 7,
            vx: 7,     
            vy: 5,     
            speed: 8.5 
        };

        // --- MOUSE INPUT ---
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - paddleHeight / 2;

            if (player.y < 10) player.y = 10;
            if (player.y > canvas.height - paddleHeight - 10) player.y = canvas.height - paddleHeight - 10;
        });

        // --- GAME LOGIC ---
        function resetBall(subtractor) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = subtractor * 7;
            ball.vy = (Math.random() - 0.5) * 8;
            ball.speed = 8.5; 
        }

        function checkCollision(b, p) {
            return b.x + b.radius > p.x && 
                   b.x - b.radius < p.x + paddleWidth && 
                   b.y + b.radius > p.y && 
                   b.y - b.radius < p.y + paddleHeight;
        }

        function update() {
            if (gameOver) return;

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.vy = -ball.vy;
            }

            let aiTarget = ball.y - paddleHeight / 2;
            ai.y += (aiTarget - ai.y) * 0.12; 

            if (ai.y < 10) ai.y = 10;
            if (ai.y > canvas.height - paddleHeight - 10) ai.y = canvas.height - paddleHeight - 10;

            let activePaddle = (ball.x < canvas.width / 2) ? player : ai;
            
            if (checkCollision(ball, activePaddle)) {
                let hitPoint = (ball.y - (activePaddle.y + paddleHeight / 2)) / (paddleHeight / 2);
                let angle = hitPoint * (Math.PI / 4);
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;
                
                ball.speed += 0.5; 
                
                ball.vx = direction * ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
            }

            if (ball.x - ball.radius < 0) {
                aiScore++;
                if (aiScore >= winningScore) {
                    gameOver = true;
                    winMessage = "COMPUTER WINS! 🤖";
                } else {
                    resetBall(1);
                }
            } else if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                if (playerScore >= winningScore) {
                    gameOver = true;
                    winMessage = "YOU ROCKED IT! 🚀";
                } else {
                    resetBall(-1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#02040a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); 

            ctx.fillStyle = '#00d2ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00d2ff';
            ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);

            ctx.fillStyle = '#ff007f';
            ctx.shadowColor = '#ff007f';
            ctx.fillRect(ai.x, ai.y, paddleWidth, paddleHeight);

            if (!gameOver) {
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0; 

            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.font = 'bold 48px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(playerScore, canvas.width / 4, 70);
            ctx.fillText(aiScore, (canvas.width / 4) * 3, 70);

            if (gameOver) {
                ctx.fillStyle = 'rgba(2, 4, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = playerScore >= winningScore ? '#ffe066' : '#ff007f';
                ctx.font = 'bold 44px "Segoe UI", sans-serif';
                ctx.fillText(winMessage, canvas.width / 2, canvas.height / 2);
                
                ctx.fillStyle = '#f3f4f6';
                ctx.font = '16px "Segoe UI", sans-serif';
                ctx.fillText('Refresh the page to play again.', canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
